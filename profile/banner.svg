<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#161a24"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#06070b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#06070b" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="#06070b"/>
  <rect width="1280" height="320" fill="url(#dots)"/>

  <!-- sparse node-graph motif, echoing the ecosystem map on xete.net -->
  <g stroke-width="1" fill="none" opacity="0.55">
    <line x1="120" y1="70" x2="230" y2="120" stroke="#c084fc"/>
    <line x1="230" y1="120" x2="205" y2="215" stroke="#60a5fa"/>
    <line x1="1090" y1="60" x2="1005" y2="130" stroke="#2dd4bf"/>
    <line x1="1005" y1="130" x2="1120" y2="200" stroke="#34d399"/>
    <line x1="1120" y1="200" x2="1015" y2="255" stroke="#fbbf24"/>
  </g>
  <g>
    <circle cx="120" cy="70"  r="4" fill="#c084fc"/>
    <circle cx="230" cy="120" r="3" fill="#60a5fa"/>
    <circle cx="205" cy="215" r="3" fill="#60a5fa"/>
    <circle cx="1090" cy="60" r="3" fill="#2dd4bf"/>
    <circle cx="1005" cy="130" r="4" fill="#2dd4bf"/>
    <circle cx="1120" cy="200" r="3" fill="#34d399"/>
    <circle cx="1015" cy="255" r="3" fill="#fbbf24"/>
  </g>

  <rect width="1280" height="320" fill="url(#fade)"/>

  <text x="640" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-weight="800" font-size="92" letter-spacing="-2" fill="#e7eaf2">xete</text>
  <text x="640" y="216" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace"
        font-weight="500" font-size="17" letter-spacing="0.3" fill="#9aa3b4">an identity you can't get banned from  ·  messages no server can read  ·  value no one can freeze</text>
</svg>
